name: Bug report
description: Something isn't working
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 124
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console errors
      render: shell
